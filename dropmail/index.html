<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dropmail · valens429.site</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080810;
      --bg2: #0d0d1a;
      --surface: #111122;
      --surface2: #1a1a2e;
      --purple: #a855f7;
      --cyan: #06b6d4;
      --purple-dim: rgba(168,85,247,0.12);
      --cyan-dim: rgba(6,182,212,0.1);
      --text: #e2e8f0;
      --muted: #64748b;
      --border: #1e1e3a;
      --border2: #2a2a4a;
      --danger: #f43f5e;
      --glow-p: 0 0 30px rgba(168,85,247,0.3);
      --glow-c: 0 0 30px rgba(6,182,212,0.3);
      --mono: 'Space Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; }

    /* NOISE */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }

    /* BLOBS */
    .blob { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; opacity: 0.12; }
    .blob-1 { width: 500px; height: 500px; background: var(--purple); top: -200px; left: -150px; animation: blobFloat 14s ease-in-out infinite; }
    .blob-2 { width: 400px; height: 400px; background: var(--cyan); bottom: -100px; right: -100px; animation: blobFloat 18s ease-in-out infinite reverse; }
    @keyframes blobFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-20px)} }

    /* GRID BG */
    .grid-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse at 30% 50%, black 20%, transparent 70%);
      opacity: 0.3;
    }

    .app { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; }

    /* HEADER */
    header {
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(8,8,16,0.9);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }
    .logo-wrap { display: flex; align-items: center; gap: 16px; }
    .logo {
      font-family: var(--display); font-weight: 800; font-size: 22px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-badge {
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      border: 1px solid var(--border2); padding: 3px 10px; letter-spacing: 2px;
    }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .live-pill {
      display: flex; align-items: center; gap: 8px;
      border: 1px solid rgba(6,182,212,0.3); padding: 6px 14px;
      background: rgba(6,182,212,0.05);
    }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(6,182,212,0.4)} 50%{opacity:0.6;box-shadow:0 0 0 4px rgba(6,182,212,0)} }
    .live-text { font-size: 10px; color: var(--cyan); letter-spacing: 2px; }

    /* MAIN LAYOUT */
    main { flex: 1; display: grid; grid-template-columns: 320px 1fr; overflow: hidden; }

    /* SIDEBAR */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      background: rgba(13,13,26,0.8);
      backdrop-filter: blur(10px);
    }

    /* GEN PANEL */
    .gen-panel { padding: 24px; border-bottom: 1px solid var(--border); }
    .panel-label {
      font-size: 10px; color: var(--purple); letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--purple-dim), transparent); }

    .input-wrap {
      display: flex; align-items: stretch;
      border: 1px solid var(--border2); background: var(--surface);
      margin-bottom: 12px; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--purple); box-shadow: var(--glow-p); }
    .input-wrap input {
      background: none; border: none; outline: none;
      color: var(--text); font-family: var(--mono); font-size: 12px;
      padding: 11px 14px; flex: 1; min-width: 0;
    }
    .input-wrap input::placeholder { color: var(--muted); }
    .input-domain {
      padding: 11px 14px; font-size: 11px; color: var(--cyan);
      border-left: 1px solid var(--border2); white-space: nowrap;
      display: flex; align-items: center; gap: 4px;
    }
    .at { color: var(--muted); }

    .btn-row { display: flex; gap: 8px; }
    .btn {
      font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
      padding: 10px 16px; border: 1px solid var(--border2);
      background: none; color: var(--text); cursor: pointer;
      transition: all 0.2s; flex: 1; text-transform: uppercase;
    }
    .btn:hover { border-color: var(--purple); color: var(--purple); background: var(--purple-dim); }
    .btn-primary {
      background: linear-gradient(135deg, var(--purple), #7c3aed);
      border-color: var(--purple); color: #fff; font-weight: 700;
    }
    .btn-primary:hover { background: linear-gradient(135deg, #c084fc, var(--purple)); color: #fff; box-shadow: var(--glow-p); }

    /* ADDR LIST */
    .addr-list { flex: 1; overflow-y: auto; padding: 12px; }
    .addr-list::-webkit-scrollbar { width: 3px; }
    .addr-list::-webkit-scrollbar-thumb { background: var(--purple-dim); }
    .addr-empty {
      padding: 40px 20px; text-align: center; font-size: 11px;
      color: var(--muted); line-height: 2;
    }
    .addr-empty-icon { font-size: 32px; opacity: 0.2; margin-bottom: 12px; }

    .addr-card {
      padding: 14px 16px; border: 1px solid transparent;
      cursor: pointer; transition: all 0.2s; margin-bottom: 6px;
      position: relative; overflow: hidden;
    }
    .addr-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
      background: linear-gradient(180deg, var(--purple), var(--cyan));
      transform: scaleY(0); transition: transform 0.2s;
    }
    .addr-card:hover { background: var(--surface); border-color: var(--border2); }
    .addr-card:hover::before { transform: scaleY(1); }
    .addr-card.active { background: var(--surface2); border-color: var(--purple); box-shadow: inset 0 0 20px var(--purple-dim); }
    .addr-card.active::before { transform: scaleY(1); }
    .addr-email { font-size: 11px; color: var(--cyan); word-break: break-all; margin-bottom: 8px; }
    .addr-footer { display: flex; align-items: center; justify-content: space-between; }
    .addr-badge {
      font-size: 9px; padding: 3px 10px; letter-spacing: 1px;
      background: rgba(168,85,247,0.15); color: var(--purple);
      border: 1px solid rgba(168,85,247,0.3);
    }
    .addr-count { font-size: 10px; color: var(--muted); }
    .addr-actions { display: flex; gap: 4px; }
    .icon-btn {
      background: none; border: none; cursor: pointer; color: var(--muted);
      font-size: 13px; padding: 4px 6px; transition: all 0.15s;
    }
    .icon-btn:hover { color: var(--text); }
    .icon-btn.danger:hover { color: var(--danger); }

    /* CONTENT */
    .content { display: flex; flex-direction: column; overflow: hidden; }
    .content-empty {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; color: var(--muted); text-align: center;
    }
    .content-empty-glyph {
      font-family: var(--display); font-size: 80px; font-weight: 800; line-height: 1;
      background: linear-gradient(135deg, var(--purple-dim), var(--cyan-dim));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      border: 1px solid var(--border2); padding: 20px 30px;
      animation: glyphPulse 4s ease-in-out infinite;
    }
    @keyframes glyphPulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
    .content-empty h3 {
      font-family: var(--display); font-size: 24px; font-weight: 800;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .content-empty p { font-size: 11px; max-width: 260px; line-height: 2; }

    /* INBOX HEADER */
    .inbox-header {
      padding: 18px 28px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(13,13,26,0.8); flex-shrink: 0;
    }
    .inbox-addr {
      font-size: 13px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      font-weight: 700;
    }
    .inbox-meta { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 1px; }

    /* MAIL LIST */
    .mail-list { flex: 1; overflow-y: auto; }
    .mail-list::-webkit-scrollbar { width: 3px; }
    .mail-list::-webkit-scrollbar-thumb { background: var(--purple-dim); }

    .mail-item {
      padding: 18px 28px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: all 0.15s;
      display: flex; gap: 16px; align-items: flex-start;
      position: relative;
    }
    .mail-item::after {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 0;
      background: linear-gradient(180deg, var(--purple), var(--cyan));
      transition: width 0.2s;
    }
    .mail-item:hover { background: var(--surface); }
    .mail-item:hover::after { width: 2px; }
    .mail-item.active { background: var(--surface2); }
    .mail-item.active::after { width: 2px; }

    .dot-wrap { padding-top: 5px; flex-shrink: 0; }
    .unread-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--purple); box-shadow: 0 0 8px var(--purple); }
    .read-dot { width: 7px; height: 7px; border-radius: 50%; border: 1px solid var(--border2); }

    .mail-info { flex: 1; min-width: 0; }
    .mail-from { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
    .mail-subject { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mail-subject.unread { color: #fff; font-weight: 700; }
    .mail-preview { font-size: 10px; color: var(--muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mail-time { font-size: 10px; color: var(--muted); flex-shrink: 0; }

    .no-mail { padding: 60px 28px; text-align: center; color: var(--muted); font-size: 11px; line-height: 2; }

    /* MAIL READER */
    .mail-reader {
      border-top: 1px solid var(--border); padding: 28px;
      max-height: 300px; overflow-y: auto;
      background: rgba(13,13,26,0.95);
      flex-shrink: 0;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .reader-subject {
      font-family: var(--display); font-size: 20px; font-weight: 800; margin-bottom: 10px;
      background: linear-gradient(135deg, var(--text), var(--muted));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .reader-divider { height: 1px; background: linear-gradient(90deg, var(--purple), var(--cyan), transparent); margin: 14px 0; }
    .reader-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-bottom: 16px; }
    .reader-body { font-size: 12px; line-height: 2; color: rgba(226,232,240,0.75); white-space: pre-wrap; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 1000;
      background: var(--surface2); border: 1px solid var(--purple);
      color: var(--purple); font-family: var(--mono); font-size: 11px;
      padding: 12px 20px; letter-spacing: 1px;
      transform: translateY(20px); opacity: 0; transition: all 0.25s;
      pointer-events: none; box-shadow: var(--glow-p);
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); }

    @media (max-width: 640px) {
      main { grid-template-columns: 1fr; }
      .sidebar { max-height: 45vh; }
    }
  </style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="grid-bg"></div>

<div class="app">
  <header>
    <div class="logo-wrap">
      <div class="logo">dropmail</div>
      <div class="logo-badge">valens429.site</div>
    </div>
    <div class="header-right">
      <div class="live-pill">
        <div class="live-dot"></div>
        <div class="live-text">LIVE</div>
      </div>
    </div>
  </header>

  <main>
    <div class="sidebar">
      <div class="gen-panel">
        <div class="panel-label">Nueva address</div>
        <div class="input-wrap">
          <input type="text" id="prefix" placeholder="alias" maxlength="30"
            onkeydown="if(event.key==='Enter')generateAddr()" />
          <div class="input-domain"><span class="at">@</span>valens429.site</div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="generateAddr()">+ Generar</button>
          <button class="btn" onclick="generateRandom()">⟳ Random</button>
        </div>
      </div>
      <div class="addr-list" id="addr-list">
        <div class="addr-empty">
          <div class="addr-empty-icon">◈</div>
          Ninguna address todavía.<br/>Generá una arriba.
        </div>
      </div>
    </div>

    <div class="content" id="content">
      <div class="content-empty">
        <div class="content-empty-glyph">DM</div>
        <h3>dropmail</h3>
        <p>Generá una address temporal y usala en cualquier servicio. Los mails aparecen acá.</p>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER_URL = 'https://dropmail-worker.valens429.workers.dev';
const DOMAIN = 'valens429.site';
const adjs = ['void','flux','echo','nova','zero','ghost','sonic','pixel','storm','neon','dark','hyper','cyber','hex','null'];
const nouns = ['cat','fox','wolf','crow','viper','lynx','hawk','tide','spark','moth','byte','node','core','pulse','link'];

let addresses = [];
let selectedAddr = null;
let selectedMail = null;
let pollInterval = null;

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randomAlias() { return `${rand(adjs)}.${rand(nouns)}${Math.floor(Math.random()*99)}`; }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function copy(text) {
  navigator.clipboard.writeText(text).catch(()=>{});
  toast('⎘ copiado al portapapeles');
}

async function fetchMails(email) {
  try {
    const res = await fetch(`${WORKER_URL}/mails?address=${encodeURIComponent(email)}`);
    if (!res.ok) return [];
    return await res.json();
  } catch { return []; }
}

async function generateAddr(alias) {
  const prefix = alias || document.getElementById('prefix').value.trim() || randomAlias();
  const email = `${prefix}@${DOMAIN}`;

  if (addresses.find(a => a.email === email)) { toast('Esa address ya existe'); return; }

  const addr = { email, created: Date.now(), mails: [] };
  addresses.unshift(addr);
  document.getElementById('prefix').value = '';

  try {
    await fetch(`${WORKER_URL}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ address: email })
    });
  } catch {}

  renderSidebar();
  selectAddr(addr);
  toast(`✦ address creada`);
}

function generateRandom() { generateAddr(randomAlias()); }

function selectAddr(addr) {
  selectedAddr = addr;
  selectedMail = null;
  renderSidebar();
  renderContent();
  startPolling();
}

function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  if (!selectedAddr) return;
  pollInterval = setInterval(async () => {
    if (!selectedAddr) return;
    const mails = await fetchMails(selectedAddr.email);
    const prev = selectedAddr.mails.length;
    selectedAddr.mails = mails;
    if (mails.length > prev) toast('✦ nuevo mail recibido');
    renderContent();
    renderSidebar();
  }, 5000);
}

function deleteAddr(email, e) {
  e && e.stopPropagation();
  addresses = addresses.filter(a => a.email !== email);
  if (selectedAddr && selectedAddr.email === email) {
    selectedAddr = null; selectedMail = null;
    clearInterval(pollInterval);
    document.getElementById('content').innerHTML = `
      <div class="content-empty">
        <div class="content-empty-glyph">DM</div>
        <h3>dropmail</h3>
        <p>Generá una address temporal y usala en cualquier servicio.</p>
      </div>`;
  }
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('addr-list');
  if (!addresses.length) {
    list.innerHTML = '<div class="addr-empty"><div class="addr-empty-icon">◈</div>Ninguna address todavía.<br/>Generá una arriba.</div>';
    return;
  }
  list.innerHTML = addresses.map(a => {
    const unread = a.mails.filter(m => !m.read).length;
    const active = selectedAddr && selectedAddr.email === a.email;
    return `<div class="addr-card${active?' active':''}" onclick="selectAddr(addresses.find(x=>x.email==='${a.email}'))">
      <div class="addr-email">${a.email}</div>
      <div class="addr-footer">
        ${unread
          ? `<span class="addr-badge">${unread} nuevo${unread>1?'s':''}</span>`
          : `<span class="addr-count">${a.mails.length} mail${a.mails.length!==1?'s':''}</span>`}
        <div class="addr-actions">
          <button class="icon-btn" onclick="copy('${a.email}');event.stopPropagation()" title="Copiar">⎘</button>
          <button class="icon-btn danger" onclick="deleteAddr('${a.email}',event)" title="Eliminar">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function selectMail(idx) {
  selectedAddr.mails[idx].read = true;
  selectedMail = selectedAddr.mails[idx];
  renderContent();
  renderSidebar();
}

function renderContent() {
  if (!selectedAddr) return;
  const content = document.getElementById('content');
  const mails = selectedAddr.mails;

  const mailListHTML = !mails.length
    ? `<div class="no-mail">◈ Sin mails todavía.<br/>Usá esta address en cualquier servicio.</div>`
    : mails.map((m, i) => `
      <div class="mail-item${selectedMail===m?' active':''}" onclick="selectMail(${i})">
        <div class="dot-wrap"><div class="${m.read?'read-dot':'unread-dot'}"></div></div>
        <div class="mail-info">
          <div class="mail-from">${esc(m.from)}</div>
          <div class="mail-subject${m.read?'':' unread'}">${esc(m.subject)}</div>
          <div class="mail-preview">${esc(m.preview||'')}</div>
        </div>
        <div class="mail-time">${esc(m.time||'')}</div>
      </div>`).join('');

  const readerHTML = selectedMail ? `
    <div class="mail-reader">
      <div class="reader-subject">${esc(selectedMail.subject)}</div>
      <div class="reader-divider"></div>
      <div class="reader-meta">
        <span>${esc(selectedMail.from)}</span>
        <span>${esc(selectedMail.time||'')}</span>
      </div>
      <div class="reader-body">${esc(selectedMail.body||selectedMail.preview||'')}</div>
    </div>` : '';

  content.innerHTML = `
    <div class="inbox-header">
      <div>
        <div class="inbox-addr">${selectedAddr.email}</div>
        <div class="inbox-meta">${mails.length} mail${mails.length!==1?'s':''} · actualiza cada 5s</div>
      </div>
      <button class="btn" style="width:auto;padding:8px 16px" onclick="copy('${selectedAddr.email}')">⎘ Copiar</button>
    </div>
    <div class="mail-list">${mailListHTML}</div>
    ${readerHTML}`;
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
